<style>
  :root{ --pri:#E4111F; --priD:#B60D18; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  [hidden]{ display:none !important; }
  html,body{ margin:0; min-height:100%; }
  body{
    font-family:'Anuphan',system-ui,sans-serif; color:#0E0F12; background:#F4F6FA;
    -webkit-text-size-adjust:100%;
  }
  input,select,textarea,button{ font-family:inherit; }

  .np-scroll::-webkit-scrollbar{ width:0; }

  @keyframes fadeUp{ from{ transform:translateY(8px); opacity:0; } to{ transform:none; opacity:1; } }

  /* โครงหน้าจอ — เต็มจอบนมือถือ, จัดกลางบนคอม */

  .brandtap:active{ transform:scale(.9); }
  .brandtap:focus-visible{ outline:none; box-shadow:0 0 0 3px var(--pri); }

  .msup{ font-size:.68em; vertical-align:super; line-height:0; margin-left:1px; }

  /* โลโก้ = ปุ่มเข้าใช้งาน */
  .logobtn{ display:block; margin:18px auto 0; padding:0; border:none; background:none; cursor:pointer;

  .pch li{ font-size:13px; line-height:1.7; }
  .pans{ font-size:13px; font-weight:700; color:#1E9E5A; margin:4px 0 0 1.7em; }
  .ptopic{ font-size:10.5px; color:#9AA0A8; margin:2px 0 0 1.7em; }
  .pexp{ font-size:12.5px; line-height:1.7; color:#3D4348; margin:5px 0 0 1.7em;
         padding-left:10px; border-left:2px solid #E4E5E7; }
  .keygrid{ display:flex; flex-wrap:wrap; gap:5px 12px; font-size:12.5px; margin-bottom:6px; }
  .kg{ min-width:58px; font-variant-numeric:tabular-nums; }

  /* ลายน้ำโลโก้กลางกระดาษ */
  .printarea{ position:relative; }
  .paperbody{ position:relative; z-index:1; }
  .wmark{
    position:absolute; left:50%; top:340px; transform:translateX(-50%);
    width:min(78%,430px); aspect-ratio:1/1; pointer-events:none; z-index:0;
    background:url("icons/watermark.jpg") no-repeat center center; background-size:contain;
  }

  @media print{
    @page{ size:A4; margin:14mm 13mm; }
    /* พิมพ์ออกมาเป็นภาพสีเหมือนที่เห็นบนจอ */
    html, body{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
    body{ background:#fff !important; }
    /* ซ่อนทุกอย่าง แล้วค่อยเปิดเฉพาะกระดาษข้อสอบ — กันแผงแอดมินติดไปด้วย */
    .shell, .gate, .noprint, .sheethead, .sheet{ display:none !important; }
    .sheet.mockwrap{ position:static !important; background:none !important; display:block !important;
            inset:auto !important; padding:0 !important; }
    .mockwrap .sheetin{ max-height:none !important; border-radius:0 !important; box-shadow:none !important;
              width:100% !important; max-width:none !important; }
    .mockwrap .printarea{ overflow:visible !important; max-height:none !important; padding:0 !important; }
    /* fixed = เบราว์เซอร์จะวางลายน้ำซ้ำให้ทุกหน้าที่พิมพ์ */
    .wmark{ position:fixed !important; left:50% !important; top:50% !important;
            transform:translate(-50%,-50%) !important; width:70% !important; }
    img{ max-height:170px !important; }
  }
</style>

<div class="gate" id="gate" hidden>

<div class="shell" id="app" hidden>
  <div class="statusbar">

<script>
"use strict";
/* ═══════════════════════════════════════════════════════════════
   ผู้ช่วยเตรียมสอบ นสต. รุ่น 18
   สร้างตามดีไซน์ ผู้ช่วยสอบนายสิบ.dc.html
   ═══════════════════════════════════════════════════════════════ */

/* ───── SHA-256 (เขียนไว้ในไฟล์ เพื่อให้ตรวจรหัสได้แม้เปิดจากไฟล์ในเครื่อง/ไม่มีเน็ต) ───── */
function sha256(str){
  function rr(v,a){ return (v>>>a)|(v<<(32-a)); }
  var msg=unescape(encodeURIComponent(str));
  var maxWord=Math.pow(2,32), i, j, result="", words=[];
  var bitLength=msg.length*8;
  var hash=sha256.h=sha256.h||[];
  var k=sha256.k=sha256.k||[];
  var primeCounter=k.length, isComposite={};
  for(var candidate=2; primeCounter<64; candidate++){
    if(!isComposite[candidate]){
      for(i=0;i<313;i+=candidate) isComposite[i]=candidate;
      hash[primeCounter]=(Math.pow(candidate,.5)*maxWord)|0;
      k[primeCounter++]=(Math.pow(candidate,1/3)*maxWord)|0;
    }
  }
  msg+="\x80";
  while(msg.length%64-56) msg+="\x00";
  for(i=0;i<msg.length;i++){
    j=msg.charCodeAt(i);
    if(j>>8) return "";
    words[i>>2]|=j<<((3-i)%4)*8;
  }
  words[words.length]=(bitLength/maxWord)|0;
  words[words.length]=bitLength;
  for(j=0;j<words.length;){
    var w=words.slice(j,j+=16), oldHash=hash;
    hash=hash.slice(0,8);
    for(i=0;i<64;i++){
      var i15=i-15, i2=i-2, a=hash[0], e=hash[4];
      var t1=hash[7]+(rr(e,6)^rr(e,11)^rr(e,25))+((e&hash[5])^(~e&hash[6]))+k[i]
        +(w[i]=(i<16)?w[i]:( w[i15]=w[i15]|0, w[i2]=w[i2]|0,
            (w[i-16]|0)+(rr(w[i15],7)^rr(w[i15],18)^(w[i15]>>>3))
            +(w[i-7]|0)+(rr(w[i2],17)^rr(w[i2],19)^(w[i2]>>>10)) )|0 );
      var t2=(rr(a,2)^rr(a,13)^rr(a,22))+((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash=[(t1+t2)|0].concat(hash);
      hash[4]=(hash[4]+t1)|0;
    }
    for(i=0;i<8;i++) hash[i]=(hash[i]+oldHash[i])|0;
  }
  for(i=0;i<8;i++)
    for(j=3;j+1;j--){
      var b=(hash[i]>>(j*8))&255;
      result+=((b<16)?0:"")+b.toString(16);
    }
  return result;
}

/* ───── ระบบรหัสเปิดใช้งาน ─────
   ⚠️ SECRET นี้ต้องตรงกับในไฟล์ "สร้างรหัส.html" ที่ใช้ออกรหัสให้นักเรียน
      ถ้าเปลี่ยนตรงนี้ รหัสเก่าที่แจกไปแล้วจะใช้ไม่ได้ทันที */
var SECRET = "nst18-lionking-2569-k7x2m9";
var LIC_KEY = "np18_license_v1";
var DEV_KEY = "np18_device_v1";
var ALPHA = "23456789ABCDEFGHJKLMNPQRSTUVWXYZ";

/* ⚠️ ลิงก์เซิร์ฟเวอร์ที่คุมว่า "1 รหัส = 1 เครื่อง" (ได้จาก Google Apps Script)
      ดูวิธีทำที่ไฟล์  เซิร์ฟเวอร์-รหัส/วิธีติดตั้ง.md
      ถ้าเว้นว่างไว้ = ไม่คุมเครื่อง (รหัสเดียวเปิดได้ทุกเครื่อง เหมือนก่อนหน้านี้) */
var ACTIVATE_URL = "https://script.google.com/macros/s/AKfycbwnlI8Pny8j8L4ltZXbPBfr9rhG4O1eAWwimhhkFqb1-TnMJJ8KKJfif-kk4jBLSFnWFA/exec";

/* รหัสประจำเครื่อง — สุ่มครั้งเดียวตอนเปิดแอปครั้งแรก ไม่มีข้อมูลส่วนตัวใด ๆ */
function deviceId(){
  var d=null;
  try{ d=localStorage.getItem(DEV_KEY); }catch(e){}
  if(!d){
    var a=new Uint8Array(8);
    (window.crypto||window.msCrypto).getRandomValues(a);
    d="D";
    for(var i=0;i<8;i++){ var h=a[i].toString(16); d+=(h.length<2?"0":"")+h; }
    try{ localStorage.setItem(DEV_KEY,d); }catch(e){}
  }
  return d;
}

function normCode(v){ return String(v||"").toUpperCase().replace(/[^A-Z0-9]/g,""); }
function checkFor(payload){ return sha256(SECRET+"|"+payload).slice(0,6).toUpperCase(); }
function validCode(v){
  var c=normCode(v);
  if(c.indexOf("NST18")!==0) return false;
  var body=c.slice(5);
  if(body.length!==11) return false;
  var p=body.slice(0,5), chk=body.slice(5);
  for(var i=0;i<5;i++) if(ALPHA.indexOf(p[i])<0) return false;
  return checkFor(p)===chk;
}
function prettyCode(v){
  var c=normCode(v);
  return "NST18-"+c.slice(5,10)+"-"+c.slice(10,16);
}
function licSig(code,dev){ return sha256(SECRET+"|lic|"+code+"|"+dev).slice(0,12).toUpperCase(); }
function readLic(){
  try{ return JSON.parse(localStorage.getItem(LIC_KEY)||"null"); }catch(e){ return null; }
}
function saveLic(v){
  var code=prettyCode(v), dev=deviceId();
  localStorage.setItem(LIC_KEY, JSON.stringify({
    code:code, device:dev, sig:licSig(code,dev), at:new Date().toISOString()
  }));
}
function isActivated(){
  var l=readLic();
  if(!(l && l.code && validCode(l.code))) return false;
  if(!ACTIVATE_URL) return true;              // ยังไม่ได้เปิดระบบคุมเครื่อง
  var dev=deviceId();
  if(l.device!==dev) return false;            // ย้ายไฟล์ไปเครื่องอื่น → ต้องกรอกรหัสใหม่
  return l.sig===licSig(l.code,dev);          // กันการแก้ข้อมูลในเครื่องแบบง่าย ๆ
}

/* คุยกับเซิร์ฟเวอร์รหัส — ใช้ text/plain เพื่อให้ Apps Script รับได้โดยไม่ติด CORS */
function askServer(action,code,cb){
  var done=false;
  var t=setTimeout(function(){ if(!done){ done=true; cb({ok:false,reason:"offline"}); } },15000);
  fetch(ACTIVATE_URL,{
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify({ action:action, code:prettyCode(code), device:deviceId() })
  })
  .then(function(r){ return r.json(); })
  .then(function(j){ if(!done){ done=true; clearTimeout(t); cb(j||{ok:false,reason:"servererror"}); } })
  .catch(function(){ if(!done){ done=true; clearTimeout(t); cb({ok:false,reason:"offline"}); } });
}

  });
}

/* ═══════════ ตัวเขียนสมการคณิตศาสตร์ ═══════════
   แปลงข้อความที่ติวเตอร์พิมพ์ ให้แสดงตามหลักการเขียนคณิตศาสตร์
     1/2          → เศษส่วนซ้อนบน-ล่าง
     2 1/2        → จำนวนคละ
     (x+1)/(x-2)  → เศษส่วนที่มีหลายพจน์
     x^2  2^(n+1) → ยกกำลัง
     a_1  a_(n+1) → ตัวห้อย
     sqrt(2)      → กรณฑ์ มีขีดบนคลุม
     <= >= != +- *  -> → ≤ ≥ ≠ ± × →
   ข้อความไทยและตัวเลขธรรมดาไม่ถูกแตะต้อง · ผ่าน esc() กันสคริปต์แฝงทุกจุด */
var MSYM = [[/<=/g,"≤"], [/>=/g,"≥"], [/!=/g,"≠"], [/\+-/g,"±"], [/->/g,"→"], [/\*/g,"×"], [/<->/g,"↔"]];
function msym(t){ MSYM.forEach(function(p){ t = t.replace(p[0], p[1]); }); return t; }
function mIsInt(t){ return /^\d+$/.test(t); }

function mtok(s){
  var out = [], i = 0, n = s.length;
  while(i < n){
    var c = s[i];
    if(c === "\n"){ out.push({k:"chr", html:"\n"}); i++; continue; }
    if(c === " " || c === "\t"){
      var j = i; while(j < n && (s[j] === " " || s[j] === "\t")) j++;
      out.push({k:"sp", html:s.slice(i,j)}); i = j; continue;
    }
    if(c === "("){                                    // วงเล็บ → หาคู่ปิด แล้วแปลงข้างในซ้ำ
      var d = 0, j2 = i, ok = false;
      for(; j2 < n; j2++){
        if(s[j2] === "(") d++;
        else if(s[j2] === ")"){ d--; if(d === 0){ ok = true; break; } }
      }
      if(ok){
        var inner = s.slice(i+1, j2);
        out.push({k:"atom", grouped:true, txt:inner, html:"(" + mrender(inner) + ")"});
        i = j2 + 1; continue;
      }
    }
    if(s.substr(i,4) === "sqrt"){ out.push({k:"fn"}); i += 4; continue; }
    if(c === "^" || c === "_" || c === "/"){ out.push({k:"op", op:c}); i++; continue; }
    if(/[0-9A-Za-z.]/.test(c)){                       // เลข/ตัวแปร = พจน์เดี่ยว
      var j3 = i; while(j3 < n && /[0-9A-Za-z.]/.test(s[j3])) j3++;
      var t = s.slice(i,j3);
      out.push({k:"atom", txt:t, html:esc(t)}); i = j3; continue;
    }
    var j4 = i;                                        // ไทย/เครื่องหมายอื่น ๆ
    while(j4 < n && !/[\s()\^_\/0-9A-Za-z.]/.test(s[j4])) j4++;
    if(j4 === i) j4 = i + 1;
    out.push({k:"chr", html:esc(msym(s.slice(i,j4)))});
    i = j4;
  }
  return out;
}
function mNextAtom(t, i){ var j = i; while(j < t.length && t[j].k === "sp") j++; return (t[j] && t[j].k === "atom") ? j : -1; }

function mSqrt(t){
  var out = [];
  for(var i = 0; i < t.length; i++){
    if(t[i].k === "fn"){
      var j = mNextAtom(t, i+1);
      if(j >= 0){
        var body = t[j].grouped ? mrender(t[j].txt) : t[j].html;
        out.push({k:"atom", html:'<span class="sq"><span class="rad">√</span><span class="bod">'+body+'</span></span>'});
        i = j; continue;
      }
      out.push({k:"chr", html:"sqrt"}); continue;
    }
    out.push(t[i]);
  }
  return out;
}
function mScript(t){
  var out = [];
  for(var i = 0; i < t.length; i++){
    if(t[i].k === "op" && (t[i].op === "^" || t[i].op === "_") &&
       out.length && out[out.length-1].k === "atom" && t[i+1] && t[i+1].k === "atom"){
      var base = out.pop();
      var sup  = t[i+1].grouped ? mrender(t[i+1].txt) : t[i+1].html;   // วงเล็บของเลขชี้กำลังไม่ต้องแสดง
      var cls  = t[i].op === "^" ? "msup" : "msub";
      out.push({k:"atom", html: base.html + '<span class="'+cls+'">' + sup + "</span>"});
      i++; continue;
    }
    out.push(t[i]);
  }
  return out;
}
function mFrac(t){
  var out = [];
  for(var i = 0; i < t.length; i++){
    // ต้องติดกันสนิท "3/4" เท่านั้น — "1 / 10" ไม่ใช่เศษส่วน
    if(t[i].k === "op" && t[i].op === "/" &&
       out.length && out[out.length-1].k === "atom" && t[i+1] && t[i+1].k === "atom"){
      var num = out.pop(), den = t[i+1];
      var nh = num.grouped ? mrender(num.txt) : num.html;
      var dh = den.grouped ? mrender(den.txt) : den.html;
      var frac = '<span class="fr"><span class="n">'+nh+'</span><span class="d">'+dh+'</span></span>';
      // จำนวนคละ: จำนวนเต็ม + เว้นวรรค + เศษส่วน  เช่น "2 1/2"
      if(!num.grouped && mIsInt(num.txt) && out.length >= 2 &&
         out[out.length-1].k === "sp" && out[out.length-2].k === "atom" &&
         mIsInt(out[out.length-2].txt)){
        out.pop();                                   // ทิ้งช่องว่าง
        var whole = out.pop();
        frac = '<span class="mixw">' + whole.html + "</span>" + frac;
      }
      out.push({k:"atom", html:frac});
      i++; continue;
    }
    out.push(t[i]);
  }
  return out;
}
function mrender(s){
  var t = mtok(String(s == null ? "" : s));
  t = mSqrt(t); t = mScript(t); t = mFrac(t);
  // สัญลักษณ์ที่ไม่ได้ถูกใช้สร้างเศษส่วน/ยกกำลัง ต้องคืนเป็นตัวอักษรตามเดิม
  // ไม่งั้นหน่วยอย่าง "ลิตร/ชม." จะกลายเป็น "ลิตรชม." (ขีดหายไปเฉย ๆ)
  t = t.map(function(x){
    if(x.k === "op") return { k:"chr", html: esc(x.op) };
    if(x.k === "fn") return { k:"chr", html: "sqrt" };
    return x;
  });
  return t.map(function(x){ return x.html; }).join("");
}
function mfrac(s){ return mrender(s); }
function pv(str){
  if(str==null) return NaN;
  var s=String(str).trim();
  if(s.indexOf(":")>=0){ var p=s.split(":").map(parseFloat); if(p.some(isNaN)) return NaN; return p[0]*60+(p[1]||0); }
  return parseFloat(s.replace(/[^0-9.]/g,""));
}

function phaseCounts(T){
  var mock=T<=1?0:Math.min(3,Math.max(2,Math.round(T*0.2)));
  var content=Math.max(1,Math.round(T*0.6));
  if(content+mock>T) mock=Math.max(0,T-content);
  var drill=T-content-mock;
  if(drill<0){ drill=0; content=T-mock; }
  return {content:content, drill:drill, mock:mock};
}
function phaseFor(i,T){ var c=phaseCounts(T); if(i<c.content) return "content"; if(i>=T-c.mock) return "mock"; return "drill"; }

  var t0=S.studyStart, t1=addTime(t0,b0), t2=addTime(t0,b0+b1), t3=addTime(t0,total);
  var timeRanges=[t0+"–"+t1, t1+"–"+t2, t2+"–"+t3];

  var daysLeft=null;
  if(S.examDate){ var ex=new Date(S.examDate+"T00:00:00"); daysLeft=Math.round((ex-today0())/MS); }
  var planNo=S.planWeeksNoDate||12;
  var T = daysLeft!=null ? Math.max(1,Math.ceil(daysLeft/7)) : planNo;

  var anchorMon=mondayOf(today0());
  var selObj=S.selDate?parseISO(S.selDate):today0();
  var weekIndex=Math.min(Math.max(0,Math.floor(Math.round((selObj-anchorMon)/MS)/7)),T-1);

  return { mins:mins, timeRanges:timeRanges, daysLeft:daysLeft, planNo:planNo, T:T,
           anchorMon:anchorMon, selObj:selObj, weekIndex:weekIndex };
}
function cellFor(entry,time){
  var k=entry[0], act=entry[1], type=entry[2];
  return { subjName:short(k), sk:k, type:type, icon:iconFor(k,type), act:act, time:time };
}
function blocksOf(dayIdx,weekIndex,T){
  var c=calc();
  var off=Number(S.dayOff);
  if(dayIdx===off) return null;
  var P=plans()[phaseFor(weekIndex,T)];
  var k=0; for(var i=0;i<dayIdx;i++){ if(i!==off) k++; }
  return P[k%6].map(function(b,bi){ return cellFor(b, c.timeRanges[bi]); });
}
/* รวม override ที่ผู้ใช้แก้เองเข้ากับบล็อกตั้งต้น */
function merged(b,weekIndex,dayIdx,bi){
  var ov=(S.edits||{})[weekIndex+":"+dayIdx+":"+bi]||{};
  var type=ov.type!=null?ov.type:b.type, sk=ov.sk!=null?ov.sk:b.sk;
  return { subjName: ov.subj!=null?ov.subj:b.subjName,
           act: ov.act!=null?ov.act:b.act,
           time: ov.time!=null?ov.time:b.time,
           type:type, sk:sk,
           icon: ov.type!=null?iconFor(sk,type):b.icon };
}

/* ───── ความพร้อม ───── */
function knowStats(){
  var done=0,total=0;
  subjects().forEach(function(su){
    (S.topics[su.k]||[]).forEach(function(t){ total++; if(S.know[t.id]) done++; });
  });
  return { done:done, total:total, pct: total?Math.round(done/total*100):0 };
}
function physStats(){
  var evs=physList(), sum=0;
  var per=evs.map(function(e){
    var targetRaw=(S.target[e.k]!=null && S.target[e.k]!=="")?S.target[e.k]:e.def;
    var target=pv(targetRaw);
    var list=(S.tests&&S.tests[e.k])||[];
    var passArr=list.map(function(v){
      var val=pv(v);
      if(isNaN(val)||isNaN(target)) return false;
      return e.dir==="high" ? val>=target : val<=target;
    });
    var n=list.length, passCount=passArr.filter(Boolean).length;
    var rate=n?passCount/n:0, ratePct=Math.round(rate*100);
    sum+=ratePct;
    return { e:e, targetRaw:targetRaw, list:list, passArr:passArr, n:n, passCount:passCount,
             ratePct:ratePct, stKey: n===0?"none":(rate>=0.8?"pass":"improve") };
  });
  return { per:per, pct: evs.length?Math.round(sum/evs.length):0 };
}

/* ═══════════ ข้อสอบ ═══════════ */
var THL=["ก","ข","ค","ง"];
/* ข้อสอบมิติสัมพันธ์ที่ตัวเลือก A-D วาดอยู่ในรูป — ปุ่มต้องขึ้น "A" เฉย ๆ
   ไม่ใช่ "ก.A" ไม่งั้นนักเรียนงงว่าให้ดูตัวอักษรชุดไหน */
function isLetterCh(ch){
  return ch && ch.length===4 && ch[0]==="A" && ch[1]==="B" && ch[2]==="C" && ch[3]==="D";
}
function chLabel(ch, ci){
  return isLetterCh(ch) ? '<b>'+ch[ci]+'</b>' : (THL[ci]||"")+". "+mfrac(ch[ci]);
}
function validQs(a){
  // โจทย์ต้องมีข้อความ "หรือ" รูป (ข้อสอบรูปภาพบางข้อไม่มีข้อความโจทย์เลย)
  return (a||[]).filter(function(x){ return x && (x.q || x.img) && Array.isArray(x.choices) && x.choices.length>=2; })
    .map(function(x){
      var o = { q:x.q||"", choices:x.choices.slice(0,4),
                answer:Math.max(0,Math.min(x.choices.length-1, x.answer|0)),
                explain:x.explain||"" };
      if(x.img)  o.img  = x.img;                    // รูปโจทย์
      if(x.ximg) o.ximg = x.ximg;                   // รูปเฉลย
      if(x.cimg) o.cimg = x.cimg.slice(0,4);        // รูปตัวเลือก
      return o;
    });
}
function drawQs(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; }
  return a.slice(0,10);
}

/* ══════════ ชุดข้อสอบเสมือนจริง ══════════
   สัดส่วนตามข้อสอบจริงของ นสต. — แก้ตัวเลขตรงนี้ได้ถ้าประกาศเปลี่ยน */
var MOCK_PLAN = [
  { k:"math",   n:30 },
  { k:"thai",   n:25 },
  { k:"eng",    n:30 },
  { k:"com",    n:25 },
  { k:"law",    n:20 },
  { k:"social", n:20 }
];
var MOCK_TOTAL = MOCK_PLAN.reduce(function(a,b){ return a+b.n; },0);

/* ข้อสอบทั้งหมดของวิชาหนึ่ง (รวมทุกหัวข้อ) พร้อมชื่อหัวข้อติดไปด้วย */
function poolOf(subj){
  var out=[];
  (S.topics[subj]||[]).forEach(function(t){
    validQs(S.bank[t.id]).forEach(function(q){
      q._topic = t.label; out.push(q);
    });
  });
  return out;
}
function shuffled(a){
  var x=a.slice();
  for(var i=x.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=x[i]; x[i]=x[j]; x[j]=t; }
  return x;
}

    rows+='<tr>'+

/* สุ่มชุดข้อสอบ */
function buildMock(){
  var items=[], gaps=[];
  MOCK_PLAN.forEach(function(p){
    var pool=poolOf(p.k), take=Math.min(p.n, pool.length);
    if(take<p.n) gaps.push({ subj:sName[p.k]||p.k, want:p.n, got:take });
    shuffled(pool).slice(0,take).forEach(function(q){
      q._subj = sName[p.k]||p.k;
      items.push(q);
    });
  });
  return { items:items, gaps:gaps, at:new Date(), mockSet:true,
           label:"ข้อสอบเสมือนจริง นายสิบตำรวจ รุ่น 18" };
}

/* ── ดึงข้อสอบเอง: เลือกวิชา / หัวข้อ / จำนวน ── */
function pickPool(){
  var subj = S.pickSubj || "math";
  if(S.pickTopic && S.pickTopic!=="_all"){
    var t=(S.topics[subj]||[]).find(function(x){ return x.id===S.pickTopic; });
    var a=validQs(S.bank[S.pickTopic]);
    a.forEach(function(q){ q._topic = t?t.label:""; });
    return a;
  }
  return poolOf(subj);
}
function buildPick(){
  var subj = S.pickSubj || "math";
  var pool = pickPool();
  var want = Math.max(1, Math.min(parseInt(S.pickN,10)||10, pool.length));
  var picked = (S.pickOrder==="bank" ? pool.slice(0,want) : shuffled(pool).slice(0,want));
  picked.forEach(function(q){ q._subj = sName[subj]||subj; });
  var tObj=(S.topics[subj]||[]).find(function(x){ return x.id===S.pickTopic; });
  return {
    items: picked, gaps: [], at: new Date(),
    label: (sName[subj]||subj) + (tObj ? " — "+tObj.label : " — ทุกหัวข้อ")
  };
}

var ADMIN_PIN="1809";

/* ═══════════ รูปภาพประกอบโจทย์ ═══════════
   เก็บรูปเป็น data URI ฝังใน questions.json เลย → อัปโหลดไฟล์เดียวจบ
   และนักเรียนได้รูปติดเครื่องไปด้วย เปิดออฟไลน์เห็นรูปแน่นอน
   ย่อ+บีบอัดก่อนเก็บเสมอ ไม่งั้นไฟล์บวมจนโหลดไม่ไหว */
var IMG_MAX = 900;          // ด้านยาวสุด (px)
var _imgTarget = null;

function pickImage(t, i){
  _imgTarget = {t:t, i:i};
  var el = document.getElementById("imgfile");
  if(!el) return;
  el.value = "";
  el.click();
}
function onImageFile(el){
  var f = el.files && el.files[0];
  if(!f) return;
  if(!/^image\//.test(f.type)){ toast("ไฟล์นี้ไม่ใช่รูปภาพ"); return; }
  var r = new FileReader();
  r.onload = function(){
    var im = new Image();
    im.onload = function(){
      var s = Math.min(1, IMG_MAX/im.width, IMG_MAX/im.height);
      var c = document.createElement("canvas");
      c.width = Math.max(1, Math.round(im.width*s));
      c.height = Math.max(1, Math.round(im.height*s));
      var x = c.getContext("2d");
      x.fillStyle = "#fff"; x.fillRect(0,0,c.width,c.height);   // พื้นโปร่งใสจะกลายเป็นดำถ้าไม่รองพื้นขาว
      x.drawImage(im, 0, 0, c.width, c.height);
      var url = c.toDataURL("image/webp", 0.8);
      if(url.indexOf("data:image/webp") !== 0) url = c.toDataURL("image/jpeg", 0.75);
      setDraftImage(url);
      toast("ใส่รูปแล้ว · " + kb(url) + " KB");
    };
    im.onerror = function(){ toast("เปิดไฟล์รูปไม่สำเร็จ"); };
    im.src = r.result;
  };
  r.onerror = function(){ toast("อ่านไฟล์ไม่สำเร็จ"); };
  r.readAsDataURL(f);
}

           imgBtn("เพิ่มรูปประกอบเฉลย", "x", null, d.ximg)+
           '<div style="display:flex;gap:10px;margin-top:16px;">'+
             '<button class="btn ghost" style="flex:1;" onclick="A.cancelDraft()">ยกเลิก</button>'+
             '<button class="btn" style="flex:1;" onclick="A.saveDraft()">บันทึก</button>'+
           '</div>'+
         '</div>';
    } else {
      h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">'+
           '<div style="font-size:12.5px;color:#6E7378;">ทั้งหมด '+list.length+' ข้อ</div>'+
           '<button class="btn sm" onclick="A.newQuestion()">＋ เพิ่มข้อสอบ</button>'+
         '</div>'+
         '<div style="display:flex;flex-direction:column;gap:10px;">'+
           list.map(function(qq,i){
             return '<div style="background:#fff;border:1px solid #E4E5E7;border-radius:12px;padding:12px;">'+
               '<div style="font-size:13.5px;font-weight:600;line-height:1.7;">'+(i+1)+'. '+mfrac(qq.q)+'</div>'+
               (qq.img?imgHTML(qq.img,110):"")+
               '<div style="font-size:12px;color:#1E9E5A;margin-top:5px;line-height:1.7;">เฉลย: '+chLabel(qq.choices,qq.answer)+'</div>'+
               '<div style="display:flex;gap:8px;margin-top:10px;">'+
                 '<button class="btn sm ghost" onclick="A.editQuestion('+i+')">แก้ไข</button>'+
                 '<button class="btn sm ghost" style="color:#6E7378;" onclick="A.delQuestion('+i+')">ลบ</button>'+
               '</div></div>';
           }).join("")+
           (list.length?"":'<div class="muted" style="text-align:center;padding:24px 0;">ยังไม่มีข้อสอบในหัวข้อนี้</div>')+
         '</div>';
    }
    h+='</div>';
  }
  h+='</div></div>';
  return h;
}

    var q={ status:"loading", subjKey:sk, topicId:id, topicLabel:t.label, subjName:short(sk),

    var q=S.quiz;

    var cur=q.questions[q.idx];

    q.picked=q.picked.concat([ci]);
    if(q.idx+1 < q.questions.length){ q.idx++; render(); return; }
    q.pct=Math.round(q.correct/q.questions.length*100);
    q.passed=q.pct>=80;
    q.status="result";
    var sc=Object.assign({},S.scores); sc[q.topicId]=q.pct;
    var kn=Object.assign({},S.know); if(q.passed) kn[q.topicId]=true;

window.A=A;

function loadQuiz(sk,id,label,subjName){
  var bank=validQs((S.bank||{})[id]);
  if(bank.length>0){ startQuiz(id, drawQs(bank)); return; }
  var cached=validQs((S.pool||{})[id]);
  if(cached.length>0){ startQuiz(id, drawQs(cached)); return; }
  // ไม่มีข้อสอบในคลัง — ถ้าเปิดในหน้าต่างพรีวิวของ Claude จะลองให้ AI ออกข้อสอบให้
  if(window.claude && window.claude.complete){ aiQuiz(sk,id,label,subjName); return; }
  if(S.quiz && S.quiz.topicId===id){ S.quiz.status="empty"; render(); }
}
function startQuiz(id,qs){
  if(!S.quiz || S.quiz.topicId!==id) return;
  S.quiz.status="active"; S.quiz.questions=qs; S.quiz.idx=0; S.quiz.picked=[]; S.quiz.correct=0;
  render();
}
function aiQuiz(sk,id,label,subjName){
  var prompt="คุณเป็นผู้ออกข้อสอบและติวเตอร์นายสิบตำรวจ (สายปราบปราม) ระดับสนามสอบจริง\n"+
    "สร้างคลังข้อสอบปรนัย 30-50 ข้อ หัวข้อ: \""+subjName+" — "+label+"\" ครอบคลุมหลายแง่มุมและห้ามซ้ำกัน\n"+
    "ตอบกลับเป็น JSON เท่านั้น ห้ามมีข้อความอื่น รูปแบบ:\n"+
    "{\"questions\":[{\"q\":\"โจทย์\",\"choices\":[\"ตัวเลือกที่1\",\"ตัวเลือกที่2\",\"ตัวเลือกที่3\",\"ตัวเลือกที่4\"],\"answer\":0,\"explain\":\"เฉลยละเอียด\"}]}\n"+
    "กติกา: แต่ละข้อมี 4 ตัวเลือก, answer เป็นดัชนี 0-3 ของตัวเลือกที่ถูก, ภาษาไทย มีคำตอบถูกเพียงข้อเดียว\n"+
    "สำคัญมาก: ฟิลด์ explain ต้องเป็นเฉลยแบบละเอียดให้มือใหม่เข้าใจง่ายที่สุด อธิบายเป็นขั้นตอน (ขึ้นบรรทัดใหม่ด้วย \\n)";
  window.claude.complete({messages:[{role:"user",content:prompt}], max_tokens:32000})
    .then(function(raw){
      var txt=String(raw).replace(/```json/gi,"").replace(/```/g,"").trim();
      var pool=validQs(JSON.parse(txt).questions);
      if(pool.length<1) throw new Error("empty");
      var p=Object.assign({},S.pool); p[id]=pool;
      S.pool=p; save();
      startQuiz(id, drawQs(pool));
    })
    .catch(function(){ if(S.quiz && S.quiz.topicId===id){ S.quiz.status="error"; render(); } });
}

function toast(msg){
  var t=document.createElement("div");
  t.className="toast"; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); },2600);
}

/* ═══════════ เริ่มทำงาน ═══════════ */
/* ดึงคลังข้อสอบกลางจากเว็บ (questions.json) — นี่คือวิธีที่ข้อสอบของติวเตอร์ไปถึงนักเรียนทุกคน
   ถ้าไม่มีเน็ต ตัว service worker จะหยิบของที่แคชไว้มาให้เอง */
function syncContent(){
  return fetch("questions.json",{cache:"no-cache"})
    .then(function(r){ return r.ok?r.json():null; })
    .then(function(d){
      if(!d) return;
      var v=d.version||0, newer = v!==(S.contentVersion||0);
      if(S.bankDirty){                             // ติวเตอร์มีข้อสอบแก้ค้าง ห้ามทับ
        if(newer) toast("มีเนื้อหาใหม่บนเว็บ — แต่ยังไม่ดึงมา เพราะมีข้อสอบที่ยังไม่ได้ส่งออก");
        return;
      }
      // ดึงคลังจากเว็บมาใส่ทุกครั้งที่เปิดแอป (ไม่ได้เก็บใน localStorage แล้ว)
      var patch={ contentVersion:v };
      if(d.topics) patch.topics=d.topics;
      if(d.bank) patch.bank=d.bank;
      if(d.physEvents) patch.physEvents=d.physEvents;
      set(patch);
      if(newer && v>1) toast("อัปเดตเนื้อหาใหม่แล้ว");
    })
    .catch(function(){});
}
/* ── ดึงข้อสอบใหม่ตอนกลับมาที่แอป ──
   นักเรียนส่วนใหญ่ไม่ได้ปิดแอปสนิท แค่สลับไปแอปอื่นแล้วกดกลับมา
   ถ้าไม่เช็คตรงนี้ เขาจะไม่ได้ข้อสอบชุดใหม่จนกว่าจะปิดแอปแล้วเปิดใหม่เอง */
var lastSyncAt = 0;
function maybeSync(){
  if(!isActivated()) return;                    // ยังไม่ได้เปิดใช้งาน
  if(S.quiz || S.adminOpen || S.mock) return;   // ทำข้อสอบ/แอดมิน/กำลังดูชุดข้อสอบ อย่ารบกวน
  if(Date.now()-lastSyncAt < 30000) return;     // เพิ่งเช็คไปไม่ถึงครึ่งนาที
  lastSyncAt = Date.now();
  syncContent();
}
function startApp(){
  document.getElementById("gate").hidden=true;
  document.getElementById("app").hidden=false;
  load();
  render();
  lastSyncAt = Date.now();
  syncContent();
  setInterval(function(){
    if(!S.quiz && !S.adminOpen && !S.mock) render();
  },60000);
  document.addEventListener("visibilitychange",function(){
    if(document.visibilityState==="visible") maybeSync();
  });
  window.addEventListener("online", maybeSync);
  document.getElementById("brandtap").onclick=function(){ A.openAdmin(); };
}
function showGate(){
  document.getElementById("app").hidden=true;
  document.getElementById("gate").hidden=false;
  var input=document.getElementById("codein");
  var err=document.getElementById("codeerr");
  var btn=document.getElementById("codebtn");

  input.addEventListener("input",function(){
    err.textContent="";
    var raw=normCode(input.value).slice(0,16);
    if(raw.indexOf("NST18")!==0 && raw.length>0 && "NST18".indexOf(raw)!==0) raw="NST18"+raw;
    var out=raw.slice(0,5);
    if(raw.length>5) out+="-"+raw.slice(5,10);
    if(raw.length>10) out+="-"+raw.slice(10,16);
    input.value=out;
  });
  var SAYS={
    offline:"ตอนเปิดใช้งานครั้งแรกต้องต่อเน็ตก่อนนะครับ\n(หลังจากนี้ใช้ได้ตลอด ไม่ต้องมีเน็ตอีก)",
    notfound:"ไม่พบรหัสนี้ในระบบ ตรวจตัวอักษรอีกครั้ง",
    used:"รหัสนี้ถูกเปิดใช้กับเครื่องอื่นไปแล้ว\n1 รหัสใช้ได้ 1 เครื่อง — ถ้าเปลี่ยนมือถือ ติดต่อผู้ขาย",
    revoked:"รหัสนี้ถูกระงับการใช้งาน กรุณาติดต่อผู้ขาย",
    busy:"ระบบกำลังยุ่ง รอสักครู่แล้วลองใหม่",
    badrequest:"เปิดใช้งานไม่สำเร็จ ลองใหม่อีกครั้ง",
    servererror:"ระบบขัดข้องชั่วคราว ลองใหม่อีกครั้ง"
  };
  function finish(v){
    try{ saveLic(v); }
    catch(e){ err.textContent="เครื่องนี้บันทึกข้อมูลไม่ได้ (ลองปิดโหมดไม่ระบุตัวตน)"; return; }
    startApp();
  }
  /* ปุ่มเปิดใช้งานคือรูปโลโก้ — ห้ามแตะ textContent ของปุ่ม (รูปจะหาย)
     บอกสถานะที่บรรทัด "แตะโลโก้เพื่อเปิดใช้งาน" ใต้โลโก้แทน */
  var hint=document.getElementById("taphint");
  var HINT=hint.textContent;
  var busy=false;
  function setBusy(on){
    busy=on;
    btn.disabled=on;
    btn.style.opacity=on?"0.45":"";
    hint.textContent=on?"กำลังตรวจสอบรหัส…":HINT;
  }
  function submit(){
    if(busy) return;
    var v=input.value;
    if(!normCode(v)){ err.textContent="กรอกรหัสก่อนนะครับ"; return; }
    if(!validCode(v)){
      err.textContent="รหัสไม่ถูกต้อง ตรวจตัวอักษรอีกครั้ง";
      input.select(); return;
    }
    if(!ACTIVATE_URL){ finish(v); return; }   // ยังไม่ได้เปิดระบบคุมเครื่อง

    setBusy(true); err.textContent="";
    askServer("activate", v, function(j){
      setBusy(false);
      if(j && j.ok){ finish(v); return; }
      err.textContent = SAYS[j && j.reason] || SAYS.servererror;
      input.select();
    });
  }
  btn.onclick=submit;
  input.addEventListener("keydown",function(e){ if(e.key==="Enter") submit(); });
}

if(isActivated()){ startApp(); revalidate(); } else showGate();

/* ── service worker: ทำให้ใช้ออฟไลน์ได้ + แจ้งเตือนเมื่อมีเวอร์ชันใหม่ ── */
if("serviceWorker" in navigator && location.protocol!=="file:"){
  window.addEventListener("load",function(){
    navigator.serviceWorker.register("sw.js").then(function(reg){
      reg.addEventListener("updatefound",function(){
        var nw=reg.installing;
        if(!nw) return;
        nw.addEventListener("statechange",function(){
          if(nw.state==="installed" && navigator.serviceWorker.controller){
            var t=document.createElement("div");
            t.className="toast";
            t.style.cursor="pointer";
            t.textContent="มีเวอร์ชันใหม่ — แตะเพื่ออัปเดต";
            t.onclick=function(){ nw.postMessage("skip-waiting"); location.reload(); };
            document.body.appendChild(t);
          }
        });
      });
    }).catch(function(){});
  });
}
</script>
</body>
</html>
